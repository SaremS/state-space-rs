name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        run: cargo test --workspace

      - name: Create uv venv and install maturin & pytest
        run: |
          uv venv
          uv pip install --python .venv/bin/python maturin pytest

      - name: Build Python module
        run: uv run --python .venv/bin/python maturin develop

      - name: Python tests
        run: uv run --python .venv/bin/python pytest tests/ -v
